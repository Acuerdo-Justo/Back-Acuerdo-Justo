services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - acuerdo_justo_uploads:/app/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  acuerdo_justo_uploads:
  caddy_data:
  caddy_config:
